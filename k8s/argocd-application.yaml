apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-provider
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: letta-agent
  source:
    repoURL: https://github.com/loaspra/claude-code-openai-wrapper
    targetRevision: main
    path: k8s
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
