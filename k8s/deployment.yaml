apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-provider
  namespace: letta-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claude-provider
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: claude-provider
    spec:
      nodeSelector:
        kubernetes.io/hostname: legion-server
      imagePullSecrets:
        - name: ghcr-pull
      initContainers:
        - name: seed-claude-credentials
          image: docker.io/busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /home/claude/.claude /tmp/claude-workspace
              cp /seed/.credentials.json /home/claude/.claude/.credentials.json
              chmod 700 /home/claude/.claude /tmp/claude-workspace
              chmod 600 /home/claude/.claude/.credentials.json
              chown -R 10001:10001 /home/claude /tmp/claude-workspace
          volumeMounts:
            - name: state
              mountPath: /home/claude
            - name: workspace
              mountPath: /tmp/claude-workspace
            - name: claude-credentials
              mountPath: /seed
              readOnly: true
      containers:
        - name: app
          image: ghcr.io/loaspra/claude-code-openai-wrapper
          imagePullPolicy: Always
          env:
            - name: HOME
              value: /home/claude
            - name: PORT
              value: "8000"
            - name: CLAUDE_CWD
              value: /tmp/claude-workspace
            - name: DEFAULT_MODEL
              value: sonnet
            - name: CLAUDE_MODELS_OVERRIDE
              value: sonnet,opus
            - name: DEBUG_MODE
              value: "false"
            - name: VERBOSE
              value: "false"
            - name: CORS_ORIGINS
              value: '["http://100.105.14.50:30457","http://127.0.0.1:30457"]'
          ports:
            - containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: state
              mountPath: /home/claude
            - name: workspace
              mountPath: /tmp/claude-workspace
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: claude-provider-state
        - name: workspace
          emptyDir: {}
        - name: claude-credentials
          secret:
            secretName: claude-provider-credentials
            defaultMode: 0400
