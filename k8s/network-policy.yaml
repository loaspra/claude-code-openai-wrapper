apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-provider-restrict
  namespace: letta-agent
spec:
  podSelector:
    matchLabels:
      app: claude-provider
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: letta-agent-service
        - podSelector:
            matchLabels:
              app: letta-agent-service-dev
      ports:
        - protocol: TCP
          port: 8000
    - from:
        - ipBlock:
            cidr: 100.105.14.50/32
        - ipBlock:
            cidr: 100.74.7.103/32
      ports:
        - protocol: TCP
          port: 8000
