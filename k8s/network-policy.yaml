apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-provider-restrict
  namespace: letta-agent
spec:
  podSelector:
    matchLabels:
      app: claude-provider
  policyTypes:
    - Ingress
  ingress:
    # Allow every pod in the cluster (single-node legion-server K3S) plus the
    # Tailscale IPs used for localhost/NodePort access. The proxy no longer
    # enforces an API key, so this NetworkPolicy is the security boundary.
    - from:
        - namespaceSelector: {}
        - ipBlock:
            cidr: 100.105.14.50/32
        - ipBlock:
            cidr: 100.74.7.103/32
      ports:
        - protocol: TCP
          port: 8000
